sources:
  ibmi-system:
    host: ${DB2i_HOST}
    user: ${DB2i_USER}
    password: ${DB2i_PASS}
    port: 8076
    ignore-unauthorized: true

# This skill's YAML tools only cover capabilities the ibmi CLI does not
# already expose as a first-class subcommand. Use the native commands for
# anything listed here:
#   ibmi schemas                    -- browse schemas
#   ibmi tables <schema> [--filter] -- list tables/views
#   ibmi columns <schema> <table>   -- column metadata
#   ibmi describe <lib>.<object>    -- generate DDL
#   ibmi validate <sql>             -- syntax + object reference check
#   ibmi sql "SELECT ... FETCH FIRST N ROWS ONLY" -- ad-hoc sampling
tools:
  get_table_statistics:
    source: ibmi-system
    description: "Get detailed table statistics beyond what `ibmi describe` returns: row count, deleted rows, data size, last used/changed/saved timestamps, I/O operation counts, and index counts. Works for both tables and views (views may have NULL statistics)."
    parameters:
      - name: schema_name
        type: string
        description: "Schema (library) name containing the table."
        required: true
      - name: table_name
        type: string
        description: "Table or view name to get statistics for."
        required: true
    statement: |
      SELECT T.TABLE_NAME, T.TABLE_TYPE, T.TABLE_TEXT, T.COLUMN_COUNT, T.ROW_LENGTH,
             S.NUMBER_ROWS, S.DATA_SIZE, S.NUMBER_DELETED_ROWS,
             S.LAST_USED_TIMESTAMP, S.LAST_CHANGE_TIMESTAMP, S.LAST_SAVE_TIMESTAMP,
             S.DAYS_USED_COUNT, S.NUMBER_DISTINCT_INDEXES,
             S.OPEN_OPERATIONS, S.CLOSE_OPERATIONS,
             S.INSERT_OPERATIONS, S.UPDATE_OPERATIONS, S.DELETE_OPERATIONS,
             S.LOGICAL_READS, S.PHYSICAL_READS
        FROM QSYS2.SYSTABLES T
        LEFT JOIN QSYS2.SYSTABLESTAT S
          ON T.TABLE_SCHEMA = S.TABLE_SCHEMA
         AND T.TABLE_NAME = S.TABLE_NAME
        WHERE T.TABLE_SCHEMA = UPPER(:schema_name)
          AND T.TABLE_NAME = UPPER(:table_name)
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ibmi"
      category: "discovery"

  search_services:
    source: ibmi-system
    description: "Search the QSYS2.SERVICES_INFO catalog by keyword in SERVICE_NAME. Returns matching SQL services with their category, schema, object type, and usage example. Use this to find the right SQL service for a task when you don't know which view/function to query."
    parameters:
      - name: keyword
        type: string
        description: "Keyword to search for in service names (e.g., 'JOB', 'DISK', 'PTF')."
        required: true
    statement: |
      SELECT SERVICE_CATEGORY, SERVICE_SCHEMA_NAME, SERVICE_NAME,
             SQL_OBJECT_TYPE, EARLIEST_POSSIBLE_RELEASE, EXAMPLE
        FROM QSYS2.SERVICES_INFO
        WHERE UPPER(SERVICE_NAME) LIKE '%' CONCAT UPPER(:keyword) CONCAT '%'
        ORDER BY SERVICE_CATEGORY, SERVICE_NAME
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ibmi"
      category: "catalog"

  list_service_categories:
    source: ibmi-system
    description: "List all SQL service categories with the count of services in each. Use this to browse what is available in the QSYS2.SERVICES_INFO catalog before drilling into a specific category."
    parameters: []
    statement: |
      SELECT SERVICE_CATEGORY, COUNT(*) AS SERVICE_COUNT
        FROM QSYS2.SERVICES_INFO
        GROUP BY SERVICE_CATEGORY
        ORDER BY SERVICE_COUNT DESC
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ibmi"
      category: "catalog"

toolsets:
  ibmi_core:
    title: "IBM i Core Tools"
    description: "Helper SQL tools that complement (not duplicate) the ibmi CLI: table statistics and SQL service catalog search."
    tools:
      - get_table_statistics
      - search_services
      - list_service_categories
