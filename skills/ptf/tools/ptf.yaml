sources:
  ibmi-system:
    host: ${DB2i_HOST}
    user: ${DB2i_USER}
    password: ${DB2i_PASS}
    port: 8076
    ignore-unauthorized: true

tools:
  check_ptf_currency:
    source: ibmi-system
    description: "Check PTF group currency status for the current system release. Shows which PTF groups are current, outdated, or have updates available."
    parameters:
      - name: currency_filter
        type: string
        description: "Filter by currency status (e.g., 'UPDATE AVAILABLE', 'CURRENT', '*ALL')"
        default: "*ALL"
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT P.PTF_GROUP_CURRENCY,
             P.PTF_GROUP_ID,
             P.PTF_GROUP_TITLE,
             P.PTF_GROUP_LEVEL_INSTALLED,
             P.PTF_GROUP_LEVEL_AVAILABLE,
             P.LAST_UPDATED_BY_IBM,
             P.PTF_GROUP_RELEASE,
             P.PTF_GROUP_STATUS_ON_SYSTEM,
             (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS LEVELS_BEHIND
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
        AND (:currency_filter = '*ALL' OR P.PTF_GROUP_CURRENCY LIKE '%' CONCAT :currency_filter CONCAT '%')
      ORDER BY PTF_GROUP_LEVEL_AVAILABLE - PTF_GROUP_LEVEL_INSTALLED DESC
      FETCH FIRST 100 ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-currency"

  list_outdated_ptf_groups:
    source: ibmi-system
    description: "List only PTF groups that have updates available, showing how many levels behind each group is."
    parameters:
      - name: min_levels_behind
        type: integer
        description: "Minimum number of levels behind to include in results (1-100)"
        default: 1
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT P.PTF_GROUP_ID,
             P.PTF_GROUP_TITLE,
             P.PTF_GROUP_LEVEL_INSTALLED,
             P.PTF_GROUP_LEVEL_AVAILABLE,
             (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS LEVELS_BEHIND,
             P.LAST_UPDATED_BY_IBM,
             P.PTF_GROUP_STATUS_ON_SYSTEM
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
        AND P.PTF_GROUP_CURRENCY = 'UPDATE AVAILABLE'
        AND (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) >= :min_levels_behind
      ORDER BY PTF_GROUP_LEVEL_AVAILABLE - PTF_GROUP_LEVEL_INSTALLED DESC
      FETCH FIRST 50 ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-currency"

  get_ptf_group_details:
    source: ibmi-system
    description: "Get detailed information about a specific PTF group, including all installed levels and their status."
    parameters:
      - name: ptf_group_name
        type: string
        description: "PTF group name or prefix (e.g., 'SF99730', 'SF997')"
        required: true
    statement: |
      SELECT PTF_GROUP_NAME,
             PTF_GROUP_DESCRIPTION,
             PTF_GROUP_LEVEL,
             PTF_GROUP_TARGET_RELEASE,
             PTF_GROUP_STATUS,
             COLLECTED_TIME
      FROM QSYS2.GROUP_PTF_INFO
      WHERE PTF_GROUP_NAME LIKE :ptf_group_name CONCAT '%'
      ORDER BY PTF_GROUP_LEVEL DESC
      FETCH FIRST 20 ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-groups"

  list_installed_ptf_groups:
    source: ibmi-system
    description: "List all PTF groups currently installed on the system with optional filtering by status and release."
    parameters:
      - name: status_filter
        type: string
        description: "Filter by status: 'INSTALLED', 'APPLY AT NEXT IPL', or '*ALL'"
        default: "*ALL"
      - name: release_filter
        type: string
        description: "Filter by release (e.g., 'R740', 'R750') or '*ALL'"
        default: "*ALL"
    statement: |
      SELECT PTF_GROUP_NAME,
             PTF_GROUP_DESCRIPTION,
             PTF_GROUP_LEVEL,
             PTF_GROUP_TARGET_RELEASE,
             PTF_GROUP_STATUS
      FROM QSYS2.GROUP_PTF_INFO
      WHERE (:status_filter = '*ALL' OR PTF_GROUP_STATUS = :status_filter)
        AND (:release_filter = '*ALL' OR PTF_GROUP_TARGET_RELEASE LIKE :release_filter CONCAT '%')
      ORDER BY PTF_GROUP_NAME, PTF_GROUP_LEVEL DESC
      FETCH FIRST 100 ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-groups"

  summarize_ptf_status:
    source: ibmi-system
    description: "Get a high-level summary of PTF currency status including counts of current, outdated, and unavailable groups."
    parameters: []
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT
        COUNT(*) AS TOTAL_PTF_GROUPS,
        SUM(CASE WHEN P.PTF_GROUP_CURRENCY LIKE '%CURRENT%' THEN 1 ELSE 0 END) AS CURRENT_GROUPS,
        SUM(CASE WHEN P.PTF_GROUP_CURRENCY = 'UPDATE AVAILABLE' THEN 1 ELSE 0 END) AS UPDATES_AVAILABLE,
        SUM(CASE WHEN P.PTF_GROUP_CURRENCY LIKE '%NOT AVAILABLE%' THEN 1 ELSE 0 END) AS INFO_NOT_AVAILABLE,
        AVG(P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS AVG_LEVELS_BEHIND,
        MAX(P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS MAX_LEVELS_BEHIND
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-summary"

  find_critical_ptf_updates:
    source: ibmi-system
    description: "Identify PTF groups that are significantly behind (critical updates needed), sorted by severity."
    parameters:
      - name: critical_threshold
        type: integer
        description: "Number of levels behind to consider critical (1-100, default: 5)"
        default: 5
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT P.PTF_GROUP_ID,
             P.PTF_GROUP_TITLE,
             P.PTF_GROUP_LEVEL_INSTALLED,
             P.PTF_GROUP_LEVEL_AVAILABLE,
             (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS LEVELS_BEHIND,
             P.LAST_UPDATED_BY_IBM,
             P.PTF_GROUP_STATUS_ON_SYSTEM,
             P.PTF_GROUP_CURRENCY
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
        AND (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) >= :critical_threshold
      ORDER BY (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) DESC
      FETCH FIRST 25 ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-currency"

  list_individual_ptfs:
    source: ibmi-system
    description: "List individual PTFs installed on the system, optionally filtered by product ID or loaded status. Shows PTF identifier, product, status, and timestamps."
    parameters:
      - name: product_filter
        type: string
        description: "Product ID to filter (e.g., '5770SS1', '5770WDS') or '*ALL' for all products."
        default: "*ALL"
      - name: status_filter
        type: string
        description: "Filter by loaded status (e.g., 'APPLIED', 'PERMANENTLY APPLIED', 'SUPERSEDED') or '*ALL'."
        default: "*ALL"
      - name: limit
        type: integer
        description: "Maximum number of PTFs to return."
        default: 100
    statement: |
      SELECT PTF_IDENTIFIER, PTF_PRODUCT_ID, PTF_PRODUCT_DESCRIPTION,
             PTF_IPL_ACTION, PTF_LOADED_STATUS, PTF_SAVE_FILE,
             PTF_STATUS_TIMESTAMP, PTF_SUPERSEDED_BY_PTF
      FROM QSYS2.PTF_INFO
      WHERE (:product_filter = '*ALL' OR PTF_PRODUCT_ID = :product_filter)
        AND (:status_filter = '*ALL' OR PTF_LOADED_STATUS = :status_filter)
      ORDER BY PTF_STATUS_TIMESTAMP DESC
      FETCH FIRST :limit ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-detail"

  check_defective_ptfs:
    source: ibmi-system
    description: "Check for defective PTFs on the system. Lists any PTFs that IBM has identified as defective along with the fixing PTF and APAR details."
    parameters: []
    statement: |
      SELECT PARTITION_NAME, HOST_NAME, SERIAL_NUMBER,
             OS_RELEASE_LEVEL, DEFECTIVE_PTF, APAR_ID,
             PRODUCT_ID, FIXING_PTF
      FROM SYSTOOLS.DEFECTIVE_PTF_CURRENCY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-currency"

  check_firmware_currency:
    source: ibmi-system
    description: "Check firmware version from system hardware resources. Shows machine type, model, serial number, and firmware level. Use this as a lightweight firmware check when SYSTOOLS.FIRMWARE_CURRENCY is unavailable."
    parameters: []
    statement: |
      SELECT RESOURCE_NAME, DEVICE_TYPE, DEVICE_MODEL,
             SERIAL_NUMBER, SYSTEM_PROCESSOR_FEATURE_CODE,
             PROCESSOR_FEATURE_CODE, INTERACTIVE_FEATURE_CODE,
             TEXT_DESCRIPTION
        FROM QSYS2.HARDWARE_RESOURCE_INFO
        WHERE RESOURCE_CATEGORY = 'PROCESSOR'
        FETCH FIRST 10 ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "firmware"

  get_ptf_group_member_details:
    source: ibmi-system
    description: "Get detailed member-level information for a PTF group from SYSTOOLS.GROUP_PTF_DETAILS. Shows individual PTFs within the group including product, status, loaded status, APAR name, and supersede info."
    parameters:
      - name: ptf_group_name
        type: string
        description: "PTF group name (e.g., 'SF99730')."
        required: true
      - name: limit
        type: integer
        description: "Maximum number of PTF detail rows to return."
        default: 100
    statement: |
      SELECT PTF_GROUP_NAME, PTF_GROUP_DESCRIPTION,
             PTF_IDENTIFIER, APAR_NAME, PTF_PRODUCT_ID,
             PTF_PRODUCT_DESCRIPTION, PTF_STATUS,
             PTF_LOADED_STATUS, PTF_SAVE_FILE,
             PTF_IPL_ACTION, PTF_ACTION_PENDING,
             PTF_SUPERSEDED_BY_PTF, PTF_CREATION_TIMESTAMP,
             PTF_INCLUDED_IN_GROUP_DATE
        FROM SYSTOOLS.GROUP_PTF_DETAILS
        WHERE PTF_GROUP_NAME = UPPER(:ptf_group_name)
        ORDER BY PTF_IDENTIFIER
        FETCH FIRST :limit ROWS ONLY
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-groups"

  get_ptf_cover_letter:
    source: ibmi-system
    description: "Retrieve the cover letter text for a specific PTF. Shows line-by-line PTF documentation including problem description, correction details, and special instructions."
    parameters:
      - name: ptf_id
        type: string
        description: "PTF identifier (e.g., 'SI76581', 'MF71475')."
        required: true
    statement: |
      SELECT LINE_NUMBER, PTF_COVER_LETTER_LINE
        FROM TABLE(SYSTOOLS.PTF_COVER_LETTER(:ptf_id))
        ORDER BY LINE_NUMBER
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "ptf"
      category: "ptf-detail"

toolsets:
  ptf_default:
    title: "PTF Management Tools"
    description: "Tools for monitoring and analyzing PTFs, PTF groups, firmware currency, and system patching status."
    tools:
      - check_ptf_currency
      - list_outdated_ptf_groups
      - get_ptf_group_details
      - list_installed_ptf_groups
      - summarize_ptf_status
      - find_critical_ptf_updates
      - list_individual_ptfs
      - check_defective_ptfs
      - check_firmware_currency
      - get_ptf_group_member_details
      - get_ptf_cover_letter
